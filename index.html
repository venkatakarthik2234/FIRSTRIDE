<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>First Ride Skating Academy</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; line-height: 1.6; color: #1e3a8a; background-color: #fef5e7; }

        /* Navigation */
        nav {
            background: linear-gradient(to right, #1e3a8a, #b45309);
            padding: 1rem 2rem;
            position: sticky; top: 0; z-index: 1000;
            border-bottom: 4px solid #fbbf24;
        }
        .nav-container { max-width: 1200px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; }
        .nav-left { display: flex; align-items: center; gap: 1rem; }
        .logo-img { height: 60px; width: 60px; object-fit: contain; } /* Adjusted logo style */
        .nav-text h1 { color: #fef3c7; font-size: 1.25rem; letter-spacing: 0.1em; }

        /* Hero Section */
        .hero { padding: 4rem 2rem; text-align: center; background: #fff; border-bottom: 2px solid #ddd; }
        .coach-highlight { color: #b45309; font-weight: bold; font-size: 1.5rem; display: block; margin: 10px 0; }

        /* Gallery */
        .gallery-section { padding: 4rem 2rem; max-width: 1200px; margin: 0 auto; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .gallery-item { 
            border: 4px solid #fff; border-radius: 10px; overflow: hidden; height: 350px; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.1); transition: transform 0.3s;
            cursor: pointer; display: block;
        }
        .gallery-item:hover { transform: scale(1.03); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        /* Contact Section */
        .contact-box { background: white; padding: 2rem; border-radius: 10px; margin: 2rem auto; max-width: 600px; border: 3px solid #1e3a8a; }
        .contact-item { display: flex; align-items: center; gap: 15px; margin: 15px 0; font-size: 1.2rem; text-decoration: none; color: #1e3a8a; font-weight: bold; }
        .contact-item i { font-size: 1.5rem; color: #b45309; width: 30px; }
        .contact-item:hover { color: #b45309; }

        /* Form */
        .register-section { background: #1e3a8a; color: white; padding: 4rem 2rem; text-align: center; }
        .form-container { max-width: 450px; margin: 0 auto; background: white; padding: 2rem; border-radius: 10px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 2px solid #ddd; border-radius: 5px; }
        button { width: 100%; padding: 15px; background: #b45309; color: white; border: none; font-weight: bold; cursor: pointer; border-radius: 5px; }
    </style>
</head>
<body>

    <nav>
        <div class="nav-container">
            <div class="nav-left">
                <img src="images/logo.png" alt="Academy Logo" class="logo-img"> <div class="nav-text"><h1>FIRST RIDE SKATING ACADEMY</h1></div>
            </div>
            <a href="https://instagram.com/first_ride_skating_academy" target="_blank" style="color: #fcd34d; font-size: 1.5rem;"><i class="fab fa-instagram"></i></a>
        </div>
    </nav>

    <section class="hero">
        <h2>Welcome to the Academy</h2>
        <span class="coach-highlight">COACH: ROHAN KALE</span>
        <p>Keep Rolling, Keep Growing!</p>
    </section>

    <section class="gallery-section">
        <h3 style="text-align: center; margin-bottom: 2rem; font-size: 2rem;">Academy Moments</h3>
        <div class="gallery-grid">
            <a href="https://instagram.com/first_ride_skating_academy" target="_blank" class="gallery-item">
                <img src="images/winners.jpg" alt="Winners">
            </a>
            <a href="https://instagram.com/first_ride_skating_academy" target="_blank" class="gallery-item">
                <img src="images/coach.jpg" alt="Coach Rohan">
            </a>
            <a href="https://instagram.com/first_ride_skating_academy" target="_blank" class="gallery-item">
                <img src="images/team.jpg" alt="Team">
            </a>
            <a href="https://instagram.com/first_ride_skating_academy" target="_blank" class="gallery-item">
                <img src="images/practice.jpg" alt="Practice">
            </a>
        </div>
    </section>

    <div class="contact-box">
        <h3 style="text-align: center; margin-bottom: 1rem;">Get In Touch</h3>
        <a href="tel:+918374691285" class="contact-item">
            <i class="fas fa-phone-alt"></i> 8374691285
        </a>
        <a href="mailto:firstride@gmail.com" class="contact-item">
            <i class="fas fa-envelope"></i> firstride@gmail.com
        </a>
        <a href="https://instagram.com/first_ride_skating_academy" target="_blank" class="contact-item">
            <i class="fab fa-instagram"></i> @first_ride_skating_academy
        </a>
    </div>

    <section class="register-section">
        <div class="form-container">
            <h2 style="color: #1e3a8a; margin-bottom: 1rem;">Register for Classes</h2>
            <form action="/register" method="POST">
                <input type="text" name="name" placeholder="Your Name" required>
                <input type="email" name="email" placeholder="Email" required>
                <input type="text" name="phone" placeholder="Phone Number" required>
                <input type="number" name="age" placeholder="Age" required>
                <button type="submit">Register Now</button>
            </form>
        </div>
    </section>

</body>
</html>
